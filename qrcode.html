<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator - ToolsbyRudy</title>
    
    <script src="https://cdn.jsdelivr.net/npm/vue@2.7.14/dist/vue.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="/LOGO.png">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: { 50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd', 400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 800: '#1e40af', 900: '#1e3a8a' },
                    }
                }
            }
        }
    </script>

    <style>
        [v-cloak] { display: none; }
        
        /* High Opacity Glassmorphism */
        .glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .dark .glass {
            background: rgba(15, 23, 42, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .gradient-text {
            background: linear-gradient(to right, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Hero Blobs */
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob { animation: blob 7s infinite; }
        .animation-delay-2000 { animation-delay: 2s; }

        .fade-slide-enter-active, .fade-slide-leave-active { transition: all 0.2s ease-out; }
        .fade-slide-enter, .fade-slide-leave-to { opacity: 0; transform: translateY(10px); }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 transition-colors duration-300">

    <div id="app" v-cloak :class="{ 'dark': isDarkMode }">
        <div class="min-h-screen bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 font-sans">
            
            <nav class="sticky top-0 z-50 glass dark:glass border-b border-slate-200 dark:border-slate-800">
                <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <div class="flex justify-between h-16 items-center">
                        <div class="flex items-center gap-3 cursor-pointer" onclick="window.location.href='index.html'">
                            <div class="flex items-center justify-center overflow-hidden rounded-lg">
                                <img src="LOGO.png" alt="ToolsbyRudy Logo" class="w-9 h-9 object-contain">
                            </div>
                            <span class="text-xl font-extrabold tracking-tight">Toolsby<span class="text-primary-600">Rudy</span></span>
                        </div>

                        <div class="hidden md:flex space-x-8 h-full items-center">
                            <div class="relative group h-full flex items-center" @mouseenter="isQrDropdownOpen = true" @mouseleave="isQrDropdownOpen = false">
                                <button class="flex items-center gap-1 hover:text-primary-600 transition-colors font-semibold py-4">
                                    QR Codes
                                    <i data-lucide="chevron-down" class="w-4 h-4 transition-transform duration-200" :class="{'rotate-180': isQrDropdownOpen}"></i>
                                </button>
                                <transition name="fade-slide">
                                    <div v-show="isQrDropdownOpen" class="absolute top-[64px] left-0 w-80 glass border border-slate-200 dark:border-slate-800 rounded-2xl shadow-2xl py-3 z-50 overflow-hidden">
                                        <a href="qrcode.html" class="flex items-center gap-4 px-4 py-3 hover:bg-primary-50 dark:hover:bg-primary-900/20 transition-colors">
                                            <div class="p-2 bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 rounded-xl">
                                                <i data-lucide="plus-circle" class="w-5 h-5"></i>
                                            </div>
                                            <div>
                                                <div class="text-sm font-bold">QR Code Generator</div>
                                                <p class="text-[11px] text-slate-500 dark:text-slate-400 leading-tight">Create single custom codes.</p>
                                            </div>
                                        </a>
                                        <a href="bulk.html" class="flex items-center gap-4 px-4 py-3 hover:bg-primary-50 dark:hover:bg-primary-900/20 transition-colors">
                                            <div class="p-2 bg-purple-100 dark:bg-purple-900/30 text-purple-600 dark:text-purple-400 rounded-xl">
                                                <i data-lucide="layers" class="w-5 h-5"></i>
                                            </div>
                                            <div>
                                                <div class="text-sm font-bold">Bulk QR Generator</div>
                                                <p class="text-[11px] text-slate-500 dark:text-slate-400 leading-tight">Generate hundreds via CSV.</p>
                                            </div>
                                        </a>
                                    </div>
                                </transition>
                            </div>
                        </div>

                        <div class="flex items-center gap-4">
                            <button @click="toggleTheme" class="p-2 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-all">
                                <i v-if="isDarkMode" data-lucide="sun" class="w-5 h-5 text-yellow-400"></i>
                                <i v-else data-lucide="moon" class="w-5 h-5 text-slate-600"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </nav>

            <div class="fixed inset-0 -z-10 overflow-hidden opacity-30 dark:opacity-20 pointer-events-none">
                <div class="absolute top-10 left-1/4 w-96 h-96 bg-blue-400 rounded-full mix-blend-multiply filter blur-3xl animate-blob"></div>
                <div class="absolute top-10 right-1/4 w-96 h-96 bg-purple-400 rounded-full mix-blend-multiply filter blur-3xl animate-blob animation-delay-2000"></div>
            </div>

            <main class="max-w-2xl mx-auto px-4 pt-16 pb-24">
                <div class="text-center mb-10">
                    <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight mb-4">
                        QR Code <span class="gradient-text">Generator</span>
                    </h1>
                    <p class="text-slate-600 dark:text-slate-400">Enter a URL or text to generate a professional, high-resolution QR code instantly.</p>
                </div>

                <div class="bg-white dark:bg-slate-900 rounded-[2.5rem] border border-slate-200 dark:border-slate-800 p-8 shadow-2xl">
                    <div class="mb-6">
                        <label class="block text-sm font-bold mb-3 ml-1">Content</label>
                        <input type="text" id="qrText" 
                            class="w-full p-4 rounded-2xl bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 focus:ring-2 focus:ring-primary-500 outline-none transition-all text-base"
                            placeholder="https://yourlink.com">
                    </div>

                    <button onclick="generateQR()" class="w-full bg-primary-600 hover:bg-primary-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-primary-500/30 transition-all flex items-center justify-center gap-2 mb-8">
                        <i data-lucide="zap" class="w-5 h-5"></i> Generate QR Code
                    </button>

                    <div id="qrBox" class="hidden flex flex-col items-center gap-6 animate-in fade-in zoom-in duration-300">
                        <div id="whiteFrame" class="bg-white p-5 rounded-3xl shadow-xl">
                            <div id="qrContent"></div>
                        </div>

                        <button id="downloadBtn" onclick="downloadQR()" class="w-full bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-4 rounded-2xl shadow-lg transition-all flex items-center justify-center gap-2">
                            <i data-lucide="download" class="w-5 h-5"></i> Download PNG
                        </button>
                    </div>
                </div>

                <footer class="mt-8 text-center text-xs text-slate-400 font-medium">
                    <i data-lucide="shield-check" class="w-4 h-4 inline mr-1 mb-0.5"></i> None of your data is stored or logged.
                </footer>
            </main>
        </div>
    </div>

    <script>
        // Vue logic for theme and navbar
        new Vue({
            el: '#app',
            data: { isDarkMode: false, isQrDropdownOpen: false },
            created() {
                const savedTheme = localStorage.getItem('theme');
                if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                    this.isDarkMode = true;
                }
            },
            mounted() { lucide.createIcons(); },
            methods: {
                toggleTheme() {
                    this.isDarkMode = !this.isDarkMode;
                    localStorage.setItem('theme', this.isDarkMode ? 'dark' : 'light');
                    this.$nextTick(() => lucide.createIcons());
                }
            },
            watch: {
                isDarkMode() { this.$nextTick(() => lucide.createIcons()); },
                isQrDropdownOpen() { this.$nextTick(() => lucide.createIcons()); }
            }
        });

        // QR Generation Logic
        function generateQR() {
            const text = document.getElementById("qrText").value.trim();
            const qrBox = document.getElementById("qrBox");
            const qrContent = document.getElementById("qrContent");

            if (!text) {
                alert("Please enter text or a URL");
                return;
            }

            qrContent.innerHTML = "";
            qrBox.classList.remove("hidden");
            qrBox.classList.add("flex");

            new QRCode(qrContent, {
                text: text,
                width: 220,
                height: 220,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });
            
            lucide.createIcons();
        }

        function downloadQR() {
            const canvas = document.querySelector("#qrContent canvas");
            if (!canvas) return;

            // Maintain the 20px padding in the final download
            const padding = 20;
            const size = canvas.width + (padding * 2);
            const finalCanvas = document.createElement("canvas");
            finalCanvas.width = size;
            finalCanvas.height = size;

            const ctx = finalCanvas.getContext("2d");
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, size, size);
            ctx.drawImage(canvas, padding, padding);

            const link = document.createElement("a");
            link.href = finalCanvas.toDataURL("image/png");
            link.download = "ToolsbyRudy_Code.png";
            link.click();
        }
    </script>
</body>
</html>
