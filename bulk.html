<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulk QR Generator - ToolsbyRudy</title>
    
    <script src="https://cdn.jsdelivr.net/npm/vue@2.7.14/dist/vue.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="/LOGO.png">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: { 50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd', 400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 800: '#1e40af', 900: '#1e3a8a' },
                    }
                }
            }
        }
    </script>

    <style>
        [v-cloak] { display: none; }
        
        .glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .dark .glass {
            background: rgba(15, 23, 42, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .gradient-text {
            background: linear-gradient(to right, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob { animation: blob 7s infinite; }
        .animation-delay-2000 { animation-delay: 2s; }

        .fade-slide-enter-active, .fade-slide-leave-active { transition: all 0.2s ease-out; }
        .fade-slide-enter, .fade-slide-leave-to { opacity: 0; transform: translateY(10px); }

        #qrContainer::-webkit-scrollbar { width: 6px; }
        #qrContainer::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark #qrContainer::-webkit-scrollbar-thumb { background: #334155; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 transition-colors duration-300">

    <div id="app" v-cloak :class="{ 'dark': isDarkMode }">
        <div class="min-h-screen bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 font-sans">
            
            <nav class="sticky top-0 z-50 glass dark:glass border-b border-slate-200 dark:border-slate-800">
                <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <div class="flex justify-between h-16 items-center">
                        <div class="flex items-center gap-3 cursor-pointer" onclick="window.location.href='index.html'">
                            <div class="flex items-center justify-center overflow-hidden rounded-lg">
                                <img src="LOGO.png" alt="ToolsbyRudy Logo" class="w-9 h-9 object-contain">
                            </div>
                            <span class="text-xl font-extrabold tracking-tight">Toolsby<span class="text-primary-600">Rudy</span></span>
                        </div>

                        <div class="hidden md:flex space-x-8 h-full items-center">
                            <div class="relative group h-full flex items-center" @mouseenter="isQrDropdownOpen = true" @mouseleave="isQrDropdownOpen = false">
                                <button class="flex items-center gap-1 hover:text-primary-600 transition-colors font-semibold py-4">
                                    QR Codes
                                    <i data-lucide="chevron-down" class="w-4 h-4 transition-transform duration-200" :class="{'rotate-180': isQrDropdownOpen}"></i>
                                </button>
                                <transition name="fade-slide">
                                    <div v-show="isQrDropdownOpen" class="absolute top-[64px] left-0 w-80 glass border border-slate-200 dark:border-slate-800 rounded-2xl shadow-2xl py-3 z-50 overflow-hidden">
                                        <a href="qrcode.html" class="flex items-center gap-4 px-4 py-3 hover:bg-primary-50 dark:hover:bg-primary-900/20 transition-colors group/item">
                                            <div class="p-2 bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 rounded-xl">
                                                <i data-lucide="plus-circle" class="w-5 h-5"></i>
                                            </div>
                                            <div>
                                                <div class="text-sm font-bold">QR Code Generator</div>
                                                <p class="text-[11px] text-slate-500 dark:text-slate-400">Single custom codes.</p>
                                            </div>
                                        </a>
                                        <a href="bulk.html" class="flex items-center gap-4 px-4 py-3 hover:bg-primary-50 dark:hover:bg-primary-900/20 transition-colors group/item">
                                            <div class="p-2 bg-purple-100 dark:bg-purple-900/30 text-purple-600 dark:text-purple-400 rounded-xl">
                                                <i data-lucide="layers" class="w-5 h-5"></i>
                                            </div>
                                            <div>
                                                <div class="text-sm font-bold">Bulk QR Generator</div>
                                                <p class="text-[11px] text-slate-500 dark:text-slate-400">Generate hundreds via CSV.</p>
                                            </div>
                                        </a>
                                    </div>
                                </transition>
                            </div>
                        </div>

                        <div class="flex items-center gap-4">
                            <button @click="toggleTheme" class="p-2 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-all">
                                <i v-if="isDarkMode" data-lucide="sun" class="w-5 h-5 text-yellow-400"></i>
                                <i v-else data-lucide="moon" class="w-5 h-5 text-slate-600"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </nav>

            <div class="fixed inset-0 -z-10 overflow-hidden opacity-30 dark:opacity-20 pointer-events-none">
                <div class="absolute top-0 left-1/4 w-96 h-96 bg-blue-400 rounded-full mix-blend-multiply filter blur-3xl animate-blob"></div>
                <div class="absolute top-0 right-1/4 w-96 h-96 bg-purple-400 rounded-full mix-blend-multiply filter blur-3xl animate-blob animation-delay-2000"></div>
            </div>

            <main class="max-w-4xl mx-auto px-4 pt-16 pb-24">
                <div class="text-center mb-12">
                    <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight mb-4">
                        Bulk QR <span class="gradient-text">Generator</span>
                    </h1>
                    <p class="text-slate-600 dark:text-slate-400">Enter your data below. Each line creates a separate high-quality QR code.</p>
                </div>

                <div class="bg-white dark:bg-slate-900 rounded-[2.5rem] border border-slate-200 dark:border-slate-800 p-8 shadow-xl">
                    <div class="mb-6">
                        <label class="block text-sm font-bold mb-2 ml-1">Data Input</label>
                        <textarea id="textInput" 
                            class="w-full min-h-[180px] p-5 rounded-3xl bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 focus:ring-2 focus:ring-primary-500 outline-none transition-all text-sm leading-relaxed"
                            placeholder="https://google.com&#10;WiFi:MyNetwork&#10;Contact:John Doe"></textarea>
                    </div>

                    <div class="flex flex-col sm:flex-row gap-4">
                        <button onclick="generateQRs()" class="flex-1 bg-primary-600 hover:bg-primary-700 text-white font-bold py-4 px-6 rounded-2xl shadow-lg shadow-primary-500/30 transition-all flex items-center justify-center gap-2">
                            <i data-lucide="refresh-cw" class="w-5 h-5"></i> Generate QRs
                        </button>
                        
                        <button id="downloadBtn" onclick="downloadZip()" class="hidden flex-1 bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-4 px-6 rounded-2xl shadow-lg transition-all flex items-center justify-center gap-2">
                            <i data-lucide="download" class="w-5 h-5"></i> Download ZIP
                        </button>
                    </div>

                    <div id="qrContainer" class="hidden mt-10 grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4 max-h-[400px] overflow-y-auto p-2">
                        </div>
                </div>

                <footer class="mt-8 text-center text-xs text-slate-400 font-medium">
                    <i data-lucide="shield-check" class="w-4 h-4 inline mr-1 mb-0.5"></i> None of your data is stored or logged.
                </footer>
            </main>
        </div>
    </div>

    <script>
        new Vue({
            el: '#app',
            data: { isDarkMode: false, isQrDropdownOpen: false },
            created() {
                const savedTheme = localStorage.getItem('theme');
                if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                    this.isDarkMode = true;
                }
            },
            mounted() { lucide.createIcons(); },
            methods: {
                toggleTheme() {
                    this.isDarkMode = !this.isDarkMode;
                    localStorage.setItem('theme', this.isDarkMode ? 'dark' : 'light');
                    this.$nextTick(() => lucide.createIcons());
                }
            },
            watch: {
                isDarkMode() { this.$nextTick(() => lucide.createIcons()); },
                isQrDropdownOpen() { this.$nextTick(() => lucide.createIcons()); }
            }
        });

        let qrData = [];

        function generateQRs() {
            const input = document.getElementById("textInput").value.trim();
            const container = document.getElementById("qrContainer");
            const downloadBtn = document.getElementById("downloadBtn");

            if (!input) {
                alert("Please enter some text");
                return;
            }

            const lines = input.split("\n").map(l => l.trim()).filter(l => l);
            qrData = [];
            container.innerHTML = "";
            container.classList.remove("hidden");
            container.classList.add("grid");

            lines.forEach((line, index) => {
                const wrapper = document.createElement("div");
                wrapper.className = "p-4 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-3xl shadow-sm flex flex-col items-center gap-4 animate-in fade-in zoom-in duration-300";
                
                const whiteFrame = document.createElement("div");
                whiteFrame.className = "bg-white p-3 rounded-xl shadow-inner";
                
                const qrDiv = document.createElement("div");
                whiteFrame.appendChild(qrDiv);
                wrapper.appendChild(whiteFrame);
                
                const label = document.createElement("span");
                label.className = "text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest";
                label.innerText = `QR #${index + 1}`;
                wrapper.appendChild(label);

                container.appendChild(wrapper);

                new QRCode(qrDiv, {
                    text: line,
                    width: 140,
                    height: 140,
                    colorDark: "#000000",
                    colorLight: "#ffffff",
                    correctLevel: QRCode.CorrectLevel.H
                });

                qrData.push(line);
            });

            if (qrData.length > 0) {
                downloadBtn.classList.remove("hidden");
                container.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        async function downloadZip() {
            const zip = new JSZip();
            const frames = document.querySelectorAll("#qrContainer canvas");

            frames.forEach((canvas, index) => {
                const text = qrData[index];
                const safeName = text.substring(0, 10).replace(/[^a-z0-9]/gi, "_");
                const padding = 20; 
                const size = canvas.width + (padding * 2);
                
                const finalCanvas = document.createElement("canvas");
                finalCanvas.width = size;
                finalCanvas.height = size;

                const ctx = finalCanvas.getContext("2d");
                ctx.fillStyle = "#ffffff";
                ctx.fillRect(0, 0, size, size);
                ctx.drawImage(canvas, padding, padding);

                const base64 = finalCanvas.toDataURL("image/png").split(",")[1];
                zip.file(`${safeName || "qr"}_${index + 1}.png`, base64, { base64: true });
            });

            const blob = await zip.generateAsync({ type: "blob" });
            saveAs(blob, "QRToolbox_Bulk_Codes.zip");
        }
    </script>
</body>
</html>
